services:
  - type: web
    name: nepal-trek-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py runserver 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: nepal-trek-db
          property: connectionString
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: nepal-trek-backend
          property: host
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: nepal-trek-frontend
          property: host
      - key: STRIPE_PUBLIC_KEY
      - key: STRIPE_SECRET_KEY
      - key: STRIPE_WEBHOOK_SECRET
      - key: KHALTI_PUBLIC_KEY
      - key: KHALTI_SECRET_KEY
      - key: ESEWA_MERCHANT_CODE
      - key: WHATSAPP_NUMBER
        value: 9779846958184

databases:
  - name: nepal-trek-db
    databaseName: nepaltrekdb
    user: postgres
    plan: free